name: Deploy Multi-Branch to GitHub Pages

on:
  push:
    branches:
      - main
      - main_v2

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder your site is in (change if you use a /dist or /build folder)
          target-folder: ${{ github.ref_name == 'main' && '/' || github.ref_name }}
          branch: gh-pages # The branch the action deploys to
